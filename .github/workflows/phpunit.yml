name: PHPUnit Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  phpunit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: [ '8.1', '8.2', '8.3' ]

    name: PHP ${{ matrix.php-version }} — PHPUnit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, intl, json, dom, simplexml
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Set up WordPress test library
        run: |
          mkdir -p /tmp/wordpress-tests-lib
          svn co --quiet https://develop.svn.wordpress.org/trunk/tests/phpunit/includes/ /tmp/wordpress-tests-lib/includes
          svn co --quiet https://develop.svn.wordpress.org/trunk/tests/phpunit/data/ /tmp/wordpress-tests-lib/data
          # Create minimal wp-tests-config.php for unit tests (no DB needed for helper tests)
          cat > /tmp/wordpress-tests-lib/wp-tests-config.php << 'EOF'
          <?php
          define( 'ABSPATH', '/tmp/wordpress/' );
          define( 'DB_NAME', 'novamira_test' );
          define( 'DB_USER', 'root' );
          define( 'DB_PASSWORD', '' );
          define( 'DB_HOST', '127.0.0.1' );
          define( 'DB_CHARSET', 'utf8' );
          define( 'DB_COLLATE', '' );
          $table_prefix = 'wptests_';
          define( 'WP_TESTS_DOMAIN', 'solar.local' );
          define( 'WP_TESTS_EMAIL', 'admin@example.org' );
          define( 'WP_TESTS_TITLE', 'Test Blog' );
          define( 'WP_PHP_BINARY', 'php' );
          define( 'WPLANG', '' );
          EOF

      - name: Set up minimal WordPress stubs
        run: |
          mkdir -p /tmp/wordpress
          # Our tests/bootstrap.php sets up stubs — no full WP install needed.

      - name: Run PHPUnit
        run: ./vendor/bin/phpunit --configuration phpunit.xml.dist --no-coverage
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          WP_TESTS_DOMAIN: solar.local
