name: PHP CodeSniffer

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  phpcs:
    runs-on: ubuntu-latest
    name: PHP CodeSniffer (WordPress Coding Standards)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring
          tools: cs2pr

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Configure PHPCS paths
        run: |
          ./vendor/bin/phpcs --config-set installed_paths \
            vendor/wp-coding-standards/wpcs,\
            vendor/phpcsstandards/phpcsutils,\
            vendor/phpcsstandards/phpcsextra

      - name: Run PHP CodeSniffer
        run: |
          ./vendor/bin/phpcs \
            --standard=phpcs.xml \
            --report=checkstyle \
            --report-file=phpcs-report.xml \
            --no-cache || true

      - name: Annotate GitHub with PHPCS results
        if: always()
        run: cs2pr phpcs-report.xml
