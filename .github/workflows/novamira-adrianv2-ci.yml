name: Novamira AdrianV2 — CI

on:
  push:
    paths:
      - 'novamira-adrianv2/**'
  pull_request:
    paths:
      - 'novamira-adrianv2/**'

jobs:
  phpcs:
    name: PHP CodeSniffer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: novamira-adrianv2
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('novamira-adrianv2/composer.json') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPCS
        run: ./vendor/bin/phpcs --standard=phpcs.xml --report=full

  psalm:
    name: Psalm Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: novamira-adrianv2
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('novamira-adrianv2/composer.json') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Psalm
        run: ./vendor/bin/psalm --no-progress --no-cache --error-format=github

  phpunit:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: novamira-adrianv2
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('novamira-adrianv2/composer.json') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: ./vendor/bin/phpunit --testdox
