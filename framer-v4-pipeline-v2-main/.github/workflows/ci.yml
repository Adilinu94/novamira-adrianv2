name: Framer V4 Pipeline CI

on:
  push:
    branches: [main, master]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'wizard.js'
      - 'package.json'
      - 'novamira-adrianv2/**'
  pull_request:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'wizard.js'
      - 'package.json'
      - 'novamira-adrianv2/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: node --test tests/pipeline.test.js

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: node --check tests/e2e.test.js

  test-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: node --check scripts/validate-v4-tree.js

  test-mcp-mock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: MCP Mock Integration Test
        run: node tests/integration.test.js

  test-visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install
      - run: node --check scripts/visual-qa.js
      - run: node --check scripts/section-compare.js

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm run lint:version

  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: |
          for f in wizard.js scripts/**/*.js tests/**/*.js; do
            node --check "$f" || exit 1
          done
          echo "All syntax OK"

  test-all:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: [test, test-e2e, test-mcp-mock, phpunit, phpcs, psalm]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run test:all
      - name: Verify test count
        run: |
          echo "test:all completed successfully"

  phpcs:
    name: PHP CodeSniffer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: novamira-adrianv2
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('novamira-adrianv2/composer.json') }}
          restore-keys: composer-
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Run PHPCS
        run: ./vendor/bin/phpcs --standard=phpcs.xml --report=full

  psalm:
    name: Psalm Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: novamira-adrianv2
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('novamira-adrianv2/composer.json') }}
          restore-keys: composer-
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Run Psalm
        run: ./vendor/bin/psalm --no-progress --no-cache --error-format=github

  phpunit:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: novamira-adrianv2
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('novamira-adrianv2/composer.json') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: ./vendor/bin/phpunit --testdox
